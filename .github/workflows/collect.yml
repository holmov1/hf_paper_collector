name: Collect Papers

on:
  # Run daily at 8am UTC (9am CET / 10am CEST)
  schedule:
    - cron: "0 8 * * *"
  # Allow manual trigger
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_COLLECTION_SLUG: ${{ secrets.HF_COLLECTION_SLUG }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}  # optional
        run: python collector.py --config config.yaml
